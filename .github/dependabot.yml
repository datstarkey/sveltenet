version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  # bun workspace: packages/*, samples/*, docs (bun.lock at the root)
  - package-ecosystem: bun
    directory: /
    schedule:
      interval: weekly
    groups:
      js-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch

  # .NET projects discovered from SvelteNet.slnx
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
    ignore:
      # The source generator targets the OLDEST supported compiler on purpose:
      # analyzers built against a newer Roslyn than the SDK ships are refused
      # with CS9057 and silently stop running (see PR #4).
      - dependency-name: 'Microsoft.CodeAnalysis*'
    groups:
      nuget-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
