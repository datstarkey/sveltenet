version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  # bun workspace: packages/*, samples/*, docs (bun.lock at the root)
  - package-ecosystem: bun
    directory: /
    schedule:
      interval: weekly
    groups:
      js-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch

  # .NET projects discovered from SvelteNet.slnx
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
    groups:
      nuget-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
